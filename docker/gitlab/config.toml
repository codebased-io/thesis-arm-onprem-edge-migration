# /etc/gitlab-runner/config.toml
#
# Tekijä: Jesse Karnavaara
# Vuosi: 2026
# Tarkoitus: Määrittelee GitLab Runnerin asetukset Codebased Oy:n kehitysinfrassa.
#            Suunniteltu kevyeksi ja turvalliseksi CI/CD-ajoympäristöksi 
#            Raspberry Pi 5 + Ubuntu Server 24.04 ARM64 -ympäristöön.
#
# Huomiot konfiguraatiosta:
# - Tietoturva: 'privileged = false' estää kontteja saamasta isäntäjärjestelmän
#   (host) pääkäyttäjäoikeuksia. Tämä on kriittinen asetus ja tukee järjestelmän 
#   CIS-tason kovennuksia.
# - Resurssienhallinta: "concurrent = 1" rajoittaa rinnakkaiset ajot yhteen, 
#   mikä varmistaa, ettei Pi:n muisti tai suoritin ylikuormitu.
# - Ympäristö: Käyttää kevyttä Alpine Linux -pohjaista Docker-executoria ja
#   on kytketty erilliseen 'migration_custom' -Docker-verkkoon.
# - Reititys: "url" ja "clone_url" on määritelty niin, että ko. gitlab_runner -kontti
#   käyttää Dockerin omaa nimipalvelujärjestelmää (DNS) verkon "migration_custom" sisällä.
#   GitLab-kehitysympäristön sijainti on huomioitu polulla "/gitlab".
#
# Verifiointi:
#   Tarkista runnerin tila ja yhteys GitLab-palvelimeen:
#   sudo gitlab-runner verify
#   sudo gitlab-runner status
#
# HUOM: Runnerin autentikointitoken on sensuroitu turvallisuussyistä.
#

concurrent = 1
check_interval = 0
connection_max_age = "15m0s"
shutdown_timeout = 0

[session_server]
  session_timeout = 1800

[[runners]]
  name = "Raspberry Pi 5 Runner"
  url = "http://gitlab/gitlab"
  clone_url = "http://gitlab/gitlab"
  id = 4
  token = "[SENSUROITU]"
  token_obtained_at = 2026-04-28T12:02:35Z
  token_expires_at = 0001-01-01T00:00:00Z
  executor = "docker"
  [runners.cache]
    MaxUploadedArchiveSize = 0
    [runners.cache.s3]
      AssumeRoleMaxConcurrency = 0
    [runners.cache.gcs]
    [runners.cache.azure]
  [runners.docker]
    tls_verify = false
    image = "alpine:3.22.4"
    privileged = false
    disable_entrypoint_overwrite = false
    oom_kill_disable = false
    disable_cache = false
    volumes = ["/cache"]
    volume_keep = false
    shm_size = 0
    network_mtu = 0
    network_mode = "migration_custom"
