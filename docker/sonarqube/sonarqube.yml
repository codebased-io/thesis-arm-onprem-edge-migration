# sonarqube.yml
#
# Tekijä: Jesse Karnavaara
# Vuosi: 2026
# Tarkoitus: SonarQube-koodianalyysipalvelun ja sen vaatiman PostgreSQL-tietokannan 
#            määritykset. Sisällytetään docker-compose.yml -päärakenteeseen.
#
# Huomiot konfiguraatiosta:
# - Arkkitehtuuri: "platform: linux/arm64" pakottaa oikeat levykuvat Raspberry Pi 5:lle.
# - Salaisuuksien hallinta: Tietokannan käyttäjätunnukset ja salasanat (POSTGRES_USER, 
#   POSTGRES_PASSWORD) injektoidaan turvallisesti ulkoisesta .env -tiedostosta 
#   muuttujainterpolaation avulla.
# - Verkkoturvallisuus (Zero Trust): SonarQuben porttia 9000 ei sidota isäntäkoneen 
#   verkkoon ("ports"-määrityksen sijaan käytetään "expose"). Palveluun pääsee 
#   käsiksi ainoastaan NGINX-käänteisvälityspalvelimen kautta.
# - Integraatio: "SONAR_WEB_CONTEXT=/sonarqube" varmistaa, että sovellus osaa 
#   käsitellä NGINX:n sille ohjaaman alipolun oikein.
# - Valvonta: Palveluille on määritetty kustomoidut healthcheckit pitkillä 
#   aloitusviiveillä (start_period: 360s), mikä estää konttien ennenaikaisen 
#   uudelleenkäynnistysluupin (crash loop) raskaiden tietokantamigraatioiden 
#   tai JVM:n käynnistymisen aikana.
#

services:
  sonarqube:
    image: sonarqube:10.4.1-community
    platform: linux/arm64
    container_name: sonarqube
    depends_on:
      - db
    environment:
      SONAR_JDBC_URL: "jdbc:postgresql://db:5432/sonar"
      SONAR_JDBC_USERNAME: "${POSTGRES_USER}"
      SONAR_JDBC_PASSWORD: "${POSTGRES_PASSWORD}"
      SONAR_WEB_CONTEXT: "/sonarqube"
    expose:
      - "9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:9000/sonarqube || exit 1
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 360s

  db:
    image: postgres:16.2
    platform: linux/arm64
    container_name: db
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "sonar"
    volumes:
      - postgresql_v16_data:/var/lib/postgresql/data
      - postgresql_v16:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d sonar"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 360s
