# Tarkoitus: NGINX-kÃĊÃĊnteisvÃĊlityspalvelimen (Reverse Proxy) konfiguraatio, 
#            joka sisÃĊllytetÃĊÃĊn docker-compose.yml -pÃĊÃĊrakenteeseen.
#            Toimii turvallisena portinvartijana kehitysinfran taustapalveluille
#            ja TLS/SSL:n terminoijana.
#
# Huomiot konfiguraatiosta:
# - Zero Trust ja Verkkoturvallisuus: Portit (80, 443) on sidottu tiukasti vain 
#   Tailscalen virtuaalisen verkkokortin IP-osoitteeseen, joka on mÃĊÃĊritelty .env -tiedostossa
#   ympÃĊristÃ¶muuttujana. 
#   Palvelut eivÃĊt ole nÃĊkyvissÃĊ julkiseen internetiin tai fyysiseen lÃĊhiverkkoon.
# - Sertifikaattien elinkaari on tehty isÃĊntÃĊkoneella (host) kÃĊyttÃĊmÃĊllÃĊ crontabia.
#   TÃĊmÃĊ varmistaa automaattisesti uusittujen Tailscale-TLS-sertifikaattien
#   saumattoman kÃĊyttÃ¶Ã¶noton ilman katkoja.
# - PienimmÃĊn oikeuden periaate (PoLP): Arkaluontoiset TLS-sertifikaatit ja avaimet 
#   on liitetty konttiin turvallisesti vain luku (Read-Only, :ro) -tiloissa.
# - Riippuvuudet: "depends_on" varmistaa, ettÃĊ NGINX reitittÃĊÃĊ liikennettÃĊ vasta, 
#   kun kriittiset taustapalvelut (SonarQube, GitLab, HashiCorp Vault) ovat ylhÃĊÃĊllÃĊ.
#
# Verifiointi:
#   Tarkista, ettÃĊ isÃĊntÃĊkone kuuntelee portteja 80/443 vain Tailscale-IP:llÃĊ:
#   sudo ss -tulpn | grep -E ":80|:443"
#

services:
  nginx:
    image: nginx:1.30
    platform: linux/arm64
    container_name: nginx_lb
    depends_on:
       - sonarqube
       - gitlab
       - hvault
    configs:
      - source: nginx_config
        target: /etc/nginx/conf.d/nginx.conf
        uid: "101" # nginx-kontin sisÃĊisen kÃĊyttÃĊjÃĊn ID
        gid: "101"
        mode: 0640
    ports:
      # Kuuntele ja lÃĊhetÃĊ liikennettÃĊ virutaaliselle tailscale0-verkkokortille
      - "${TAILSCALE_ADDRESS}:80:80"
      - "${TAILSCALE_ADDRESS}:443:443"
    volumes:
      - /etc/ssl/certs/tailscale.crt:/etc/ssl/certs/tailscale.crt:ro
      - /etc/ssl/private/tailscale.key:/etc/ssl/private/tailscale.key:ro