# nginx.conf
#
# Tekijä: Jesse Karnavaara
# Vuosi: 2026
# Tarkoitus: NGINX-pääkonfiguraatio (Reverse Proxy), joka reitittää liikenteen 
#            turvallisesti Codebased Oy:n kehitysinfran taustapalveluille.
#
# Huomiot konfiguraatiosta:
# - Tietoturva: "server_tokens off" piilottaa NGINX:n versiotiedot HTTP-otsakkeista, 
#   mikä vaikeuttaa haavoittuvuuksien automaattista kartoitusta. Kaikki HTTP-liikenne 
#   pakotetaan HTTPS:ksi (301 Redirect).
# - TLS/SSL: TLS-terminointi hoidetaan keskitetysti Tailscalen luomilla 
#   sertifikaateilla. Perinteistä ACME/Let's Encrypt -haastetta ei tarvita, 
#   koska liikenne pysyy suojatussa overlay-verkossa.
# - Obfuskointi: Juuripolku (/) ohjaa liikenteen ulkoiseen palveluun (office.com). 
#   Tämä estää oletussivun näyttämisen ja piilottaa palvelimen todellisen 
#   käyttötarkoituksen satunnaisilta kyselyiltä.
# - Suorituskyky: "upstream"-lohkoissa käytetään "keepalive"-määrityksiä, 
#   jotka pitävät taustayhteydet auki ja vähentävät TCP-kättelyiden aiheuttamaa 
#   viivettä proxy-palvelimen ja konttien välillä.
# - Integraatiot: SonarQube-reitityksessä on huomioitu virallisen dokumentaation 
#   vaatimat erikoisotsakkeet (Sonar-MD5 ym.) turvallista proxy-toimintaa varten.
#
# HUOM: Tämä on julkiseen opinnäytetyöhön tarkoitettu tiedosto. 
#       Verkko-osoitteet on sensuroitu osittain.

upstream gitlab {
  keepalive 3;
  server gitlab:443;
  server gitlab:80;
}

upstream sonarqube {
  keepalive 2;
  server sonarqube:9000;
}

upstream hvault {
  keepalive 2;
  server hvault:8200;
}

upstream passbolt {
  keepalive 2;
  server passbolt:80;
}

server {
  # Ohjaa HTTP:stä HTTPS:ään
  # ACME-vahvistusmenetelmää ei tarvita, sillä Tailscale hoitaa TLS/SSL-sertifioinnin ja uusinnat
  listen 80;
  server_name codebased-edge.[SENSUROITU].ts.net;
  server_tokens off;

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  server_name codebased-edge.[SENSUROITU].ts.net;
  server_tokens off;

  # Käytä `tailscale cert` komennolla generoituja sertifikaatteja:
  ssl_certificate /etc/ssl/certs/tailscale.crt;
  ssl_certificate_key /etc/ssl/private/tailscale.key;

  location / {
    return 301 https://www.office.com/apps;
  }

  location /sonarqube {
    proxy_http_version 1.1;
    proxy_pass http://sonarqube;

    proxy_set_header  Host                $host;
    proxy_set_header  X-Real-IP           $remote_addr;
    proxy_set_header  X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header  X-Forwarded-Proto   https;

    # Custom Sonarqube related HTTP headers, which should be set:
    # https://docs.sonarqube.org/latest/setup-and-upgrade/configure-and-operate-a-server/operating-the-server/#securing-the-server-behind-a-proxy
    proxy_set_header  SonarQube-Authentication-Token-Expiration $http_sonarqube_authentication_token_expiration;
    proxy_set_header  Sonar-MD5 $http_sonar_md5;

    proxy_set_header  "Connection" "";
  }

  location /gitlab {
    proxy_http_version 1.1;
    proxy_pass http://gitlab;

    proxy_set_header   Host                $host;
    proxy_set_header   X-Real-IP           $remote_addr;
    proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto   https;
    proxy_set_header   "Connection" "";
  }

  location /ui/ {
    proxy_http_version 1.1;
    proxy_pass http://hvault/ui/;

    proxy_set_header   Host                $host;
    proxy_set_header   X-Real-IP           $remote_addr;
    proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto   https;
    proxy_set_header   "Connection" "";
  }

  location /v1/ {
    proxy_pass http://hvault/v1/;
    
    proxy_set_header   Host                $host;
    proxy_set_header   X-Real-IP           $remote_addr;
    proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto   https;
    proxy_set_header   "Connection" "";
  }

  location /passbolt/ {
    proxy_http_version 1.1;
    proxy_pass http://passbolt/;
    
    proxy_set_header   Host                $host;
    proxy_set_header   X-Real-IP           $remote_addr;
    proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto   https;
    proxy_set_header   "Connection" "";
  }
}
