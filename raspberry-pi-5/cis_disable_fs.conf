# /etc/modprobe.d/cis_1.1.1.10_disable_legacy_fs.conf
# CIS Ubuntu Linux 24.04 LTS Benchmark v1.0.0 (https://www.cisecurity.org/benchmark/ubuntu_linux)
# Sääntö: 1.1.1.10 - Ensure unused filesystems kernel modules are not available (Manual)
#
# Tekijä: Jesse Karnavaara
# Vuosi: 2026
# Tarkoitus: Vähentää kernelin hyökkäyspintaa poistamalla legacy- ja harvoin käytetyt tiedostojärjestelmät.
#            Sopii Raspberry Pi 5 + Ubuntu Server 24.04 ARM64 -ympäristöön (Codebased Oy:n kehitysinfra).
#
# Raspberry Pi 5 -spesifiset poikkeukset (riski hyväksytään):
# - fat, vfat: Käytetään /boot/firmware -osiolla (Raspberry Pi boot loader)
# - squashfs: Käytetään snap-paketeissa
#
# Verifiointi:
#   1. Tarkista onko moduuleja ladattuna:
#      lsmod | grep -E 'cramfs|freevxfs|hfs|hfsplus|udf|reiserfs|jfs|nilfs2'
#   2. Testaa moduulin asennuksen esto:
#      modprobe -n -v cramfs
#
# Huom: Tämän tiedoston luomisen jälkeen on suositeltavaa ajaa "sudo depmod -a" ja 
#       'sudo update-initramfs -u', jotta voidaan olla varmoja, ettei mikään
#       estetyistä moduuleista ole jäänyt alkulatauskuvan (initramfs) sisään.

install minix /bin/true
blacklist minix
install qnx4 /bin/true
blacklist qnx4
install qnx6 /bin/true
blacklist qnx6
install adfs /bin/true
blacklist adfs
install befs /bin/true
blacklist befs
install jfs /bin/true
blacklist jfs
install nilfs2 /bin/true
blacklist nilfs2
install affs /bin/true
blacklist affs
install reiserfs /bin/true
blacklist reiserfs
install efs /bin/true
blacklist efs
install bfs /bin/true
blacklist bfs
install sysv /bin/true
blacklist sysv
install coda /bin/true
blacklist coda
install romfs /bin/true
blacklist romfs
install hpfs /bin/true
blacklist hpfs
install omfs /bin/true
blacklist omfs
install orangefs /bin/true
blacklist orangefs
