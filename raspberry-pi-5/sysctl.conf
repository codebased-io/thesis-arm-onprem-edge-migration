# /etc/sysctl.conf
#
# Tekijä: Jesse Karnavaara
# Vuosi: 2026
# Tarkoitus: Määrittää Linux-ytimen (kernel) parametrit vastaamaan Codebased Oy:n
#            kehitysinfran ja sovellusten (Docker, SonarQube) vaatimuksia.
#
# Huomiot konfiguraatiosta ja CIS-poikkeuksista:
# - Docker ja reititys (ip_forward): CIS Benchmark suosittelee oletuksena arvoa 0 
#   (Control: Ensure IP forwarding is disabled). Tämä on kuitenkin pakko asettaa 
#   arvoon 1 (päälle), jotta Dockerin virtuaaliverkot voivat reitittää liikennettä 
#   konttien välillä ja isäntäkoneesta ulospäin. Tämä on hyväksytty poikkeus.
# - SonarQube / Elasticsearch (max_map_count): Elasticsearch käyttää mmapfs-hakemistoa 
#   indeksien tallentamiseen. Käyttöjärjestelmän oletusraja virtuaalimuistialueiden 
#   määrälle (yleensä 65530) on liian matala. Nostettu vaadittuun minimiin 262144, 
#   jotta SonarQuben tietokanta ei kaadu 'Out of Memory' -tyyppisiin virheisiin.
# - Tiedostokahvat (file-max): Nostettu järjestelmänlaajuinen maksimiraja avoimille 
#   tiedostoille (1310728). Elasticsearch avaa toimiessaan valtavan määrän tiedostoja, 
#   ja tämä varmistaa, ettei koko isäntäkoneelta lopu resurssit kesken.
#
# Verifiointi:
#   Aja 'sudo sysctl --system' ladataksesi asetukset uudelleen.
#   Tarkista yksittäinen arvo: 'sysctl vm.max_map_count'
#
# HUOM: Muut kernel-parametrit on piilotettu, sillä ne olivat joko oletuksia tai
#       ansible-lockdown/UBUNTU24-CIS -roolin toimesta asetettuja 

# Laitetaan päälle, sillä Docker käyttää IPv4-edelleenlähetystä verkkoliikenteen 
# reitittämiseen isäntäkoneesta konttien verkkoihin:
net.ipv4.ip_forward=1

# SonarQuben (Elasticsearch) vaatimat muisti- ja tiedostorajat:
vm.max_map_count=262144
fs.file-max=1310728
